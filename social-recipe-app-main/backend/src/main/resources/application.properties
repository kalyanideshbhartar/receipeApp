spring.application.name=recipe-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/social_recipe_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.ignore-missing-migrations=true
spring.flyway.validate-on-migrate=false
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:culinario}
cloudinary.api_key=${CLOUDINARY_API_KEY:key}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:secret}

app.jwt.secret=${JWT_SECRET_KEY:standard_jwt_secret_key_which_is_long_enough_for_hs512_security}
app.jwt.expirationMs=86400000

server.port=8082


# ==========================================
# 📧 MAIL SERVER SETTINGS (Verified)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:admin@culinario.com}
spring.mail.password=${MAIL_PASSWORD:password_here}
app.mail.dev-mode=${APP_MAIL_DEV_MODE:false}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.prefix=access_log
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b

stripe.api.key=${STRIPE_API_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
